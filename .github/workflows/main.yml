name: Selenium Test Suite
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    # --- THÊM MATRIX TẠI ĐÂY ---
    strategy:
      matrix:
        browser: [chrome, firefox] # Khai báo 2 luồng [cite: 143-144, 997]
      fail-fast: false
    # ---------------------------
    
    defaults:
      run:
        working-directory: ./Lab9_Theory_POM_DDT
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      # Thêm biến matrix.browser vào lệnh mvn [cite: 148-150]
      - name: Chạy Selenium Tests (${{ matrix.browser }})
        run: mvn clean test -Dbrowser=${{ matrix.browser }} -Denv=dev -DsuiteXmlFile=testng-smoke.xml
        env:
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
        
      # Tách riêng file báo cáo theo từng trình duyệt
      - name: Lưu kết quả test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            Lab9_Theory_POM_DDT/target/surefire-reports/
            Lab9_Theory_POM_DDT/target/screenshots/
          retention-days: 30
