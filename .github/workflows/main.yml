name: Selenium Test Suite
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Lab9_Theory_POM_DDT # Báo cho GitHub biết code nằm ở đây
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Chạy Selenium Tests
        run: mvn clean test -Dbrowser=chrome -Denv=dev -DsuiteXmlFile=testng-smoke.xml
        
      - name: Lưu kết quả test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          # Phải trỏ đúng vào thư mục con thì nó mới tìm thấy file
          path: |
            Lab9_Theory_POM_DDT/target/surefire-reports/
            Lab9_Theory_POM_DDT/target/screenshots/
          retention-days: 30
